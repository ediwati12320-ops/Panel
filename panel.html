<!DOCTYPE html>
<html>
<head>
  <title>Panel Ulangan TIK Genap</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .panel {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      width: 400px;
      text-align: center;
    }
    h1 { color: #2c3e50; margin-bottom: 10px; }
    p { color: #7f8c8d; margin-bottom: 30px; }
    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 2px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
    }
    button:hover { background: #45a049; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>📝 Ulangan TIK Semester Genap</h1>
    <p>Masukin data dulu baru mulai</p>
    
    <form action="https://docs.google.com/forms/d/e/1FAIpQLSfm3yknfAlKZQle5vipFusV4bLGkDI2xo7BamaIB1UUIXpNYA/formResponse" method="POST" target="_blank">
      <input type="text" name="entry.123456" placeholder="Nama Lengkap" required>
      <input type="text" name="entry.654321" placeholder="Kelas / No Absen" required>
      <button type="submit">Mulai Ujian 🚀</button>
    </form>
  </div>
</body>
</html>
